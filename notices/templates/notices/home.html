<!DOCTYPE html>
<html>
<head>
    <title>Township Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: #1f2d3d;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 20px;
        }

        .notice {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .notice:hover {
            transform: scale(1.01);
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }

        .date {
            font-size: 12px;
            color: gray;
            margin-bottom: 10px;
        }

        .content {
            font-size: 14px;
            color: #444;
        }

        .empty {
            text-align: center;
            color: gray;
        }
    </style>
</head>

<body>

<header>
    <h2>🏢 Township Notice Board</h2>
</header>

<div class="container">
    {% for notice in notices %}
        <div class="notice">
            <div class="title">{{ notice.title }}</div>
            <div class="date">{{ notice.created_at|date:"d M Y, H:i" }}</div>
            <div class="content">{{ notice.content }}</div>
        </div>
    {% empty %}
        <p class="empty">No notices available</p>
    {% endfor %}
</div>

</body>
</html>
