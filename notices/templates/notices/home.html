<!DOCTYPE html>
<html>
<head>
    <title>Township Notice Board</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            margin: 0;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            margin-top: 20px;
        }
        .notice {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #3498db;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
        .date {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<header>
    <h2>🏢 Township Notice Board</h2>
</header>

<div class="container">
    {% for notice in notices %}
        <div class="notice">
            <div class="title">{{ notice.title }}</div>
            <div class="date">{{ notice.created_at }}</div>
            <p>{{ notice.content }}</p>
        </div>
    {% empty %}
        <p>No notices available</p>
    {% endfor %}
</div>

</body>
</html>
